<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #ffffff 0%, #fff7ef 55%, #ffe9d6 100%);
      color: #222;
    }

    .register-card {
      width: min(92vw, 520px);
      padding: 28px;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid #f3dfcf;
      box-shadow: 0 2px 8px rgba(36, 20, 5, 0.05);
    }

    h1 {
      margin: 0 0 18px;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 600;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 500;
    }

    input,
    button {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 0.98rem;
    }

    input {
      border: 1px solid #d9d9d9;
      background: #fff;
    }

    input:focus {
      outline: none;
      border-color: #e8a46b;
      box-shadow: 0 0 0 2px rgba(232, 164, 107, 0.18);
    }

    .password-help {
      margin: 0;
      font-size: 0.84rem;
      color: #666;
      line-height: 1.35;
    }

    .captcha-field {
      margin-top: 10px;
    }

    .captcha-box {
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      display: block;
      text-align: left;
    }

    .h-captcha {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      row-gap: 8px;
      margin: 0;
    }

    .h-captcha iframe {
      display: block;
    }

    .captcha-error {
      margin: 4px 0 0;
      min-height: 18px;
      font-size: 0.84rem;
      color: #c0392b;
    }

    button {
      border: 0;
      background: #f29a52;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #e88d44;
    }
  </style>
</head>
<body>
  <div class="register-card">
    <h1>Register</h1>
    <form action="#" method="post" id="register-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="8"
          maxlength="16"
          pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,16}"
          title="8-16 characters, including at least 1 uppercase letter, 1 lowercase letter, and 1 special character."
          aria-describedby="password-help"
        />
        <p class="password-help" id="password-help">Use 8-16 characters with uppercase, lowercase, and a special character.</p>
      </div>

      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input
          type="password"
          id="confirm-password"
          name="confirm-password"
          required
          title="Please re-enter the same password."
        />
      </div>

      <div class="field captcha-field">
        <label for="hcaptcha-widget">Human Verification</label>
        <div class="captcha-box">
          <div
            id="hcaptcha-widget"
            class="h-captcha"
            data-sitekey="10000000-ffff-ffff-ffff-000000000001"
            data-callback="onHCaptchaSuccess"
            data-expired-callback="onHCaptchaExpired"
            data-error-callback="onHCaptchaError"
          ></div>
        </div>
        <p class="captcha-error" id="captcha-error" aria-live="polite"></p>
      </div>

      <button type="submit">Register</button>
    </form>
  </div>

  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <script>
    const form = document.getElementById('register-form');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm-password');
    const captchaError = document.getElementById('captcha-error');

    function validatePasswordMatch() {
      if (confirmPassword.value && password.value !== confirmPassword.value) {
        confirmPassword.setCustomValidity('Passwords do not match.');
      } else {
        confirmPassword.setCustomValidity('');
      }
    }

    function getHCaptchaToken() {
      const tokenInput = form.querySelector('textarea[name="h-captcha-response"]');
      return tokenInput ? tokenInput.value.trim() : '';
    }

    function validateHumanVerification() {
      const token = getHCaptchaToken();
      if (token) {
        captchaError.textContent = '';
        return true;
      } else {
        captchaError.textContent = 'Please complete human verification.';
        return false;
      }
    }

    window.onHCaptchaSuccess = function () {
      validateHumanVerification();
    };

    window.onHCaptchaExpired = function () {
      validateHumanVerification();
    };

    window.onHCaptchaError = function () {
      validateHumanVerification();
    };

    password.addEventListener('input', validatePasswordMatch);
    confirmPassword.addEventListener('input', validatePasswordMatch);

    form.addEventListener('submit', function (event) {
      validatePasswordMatch();
      const isHumanVerified = validateHumanVerification();
      if (!isHumanVerified) {
        event.preventDefault();
      }
    });
  </script>
</body>
</html>
